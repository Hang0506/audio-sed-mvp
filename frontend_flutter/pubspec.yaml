name: frontend_flutter
description: "AI Health 360 - Respiratory Health Sound Event Detection & Apnea Screening App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6

  # Dependency Injection
  get_it: ^9.2.1

  # HTTP Client
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.1

  # Audio Recording & Playback
  record: ^6.2.1
  audioplayers: ^6.0.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  camera: ^0.11.0
  # Environment Config
  flutter_dotenv: ^5.1.0

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  http_parser: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
